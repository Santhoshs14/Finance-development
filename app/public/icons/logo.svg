<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#brandGrad)"/>
  <!-- W letterform with flowing curves -->
  <path d="M128 160 L192 352 L256 220 L320 352 L384 160" 
        stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Accent dot / flow indicator -->
  <circle cx="256" cy="380" r="18" fill="url(#accentGrad)"/>
</svg>
